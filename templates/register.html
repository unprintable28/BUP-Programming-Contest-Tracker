<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — BUP Contest Tracker</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">⚡</div>
      <h1>Participant Registration</h1>
      <p>Create your contest account</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat,msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}{% endif %}
    {% endwith %}

    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Your full name" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="your@bup.edu.bd" required>
      </div>
      <div class="form-group">
        <label>Department</label>
        <input type="text" name="department" placeholder="e.g. CSE" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min 6 characters" minlength="6" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Register</button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
    </div>
  </div>
</div>
</body>
</html>
